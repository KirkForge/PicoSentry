name: PicoDome Admission Real-Cluster Matrix

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admission-kind:
    name: admission-kind (${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # kind node images for the last three supported Kubernetes minor releases.
        k8s-version:
          - v1.28.13
          - v1.29.8
          - v1.30.4
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up kind (${{ matrix.k8s-version }})
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0
          node_image: kindest/node:${{ matrix.k8s-version }}
          cluster_name: picosentry-admission-${{ matrix.k8s-version }}
          wait_on_ready: true

      - name: Run admission live test
        run: |
          export PICOSENTRY_KIND_CLUSTER="picosentry-admission-${{ matrix.k8s-version }}"
          export PICOSENTRY_KIND_SKIP_CREATE=1
          bash scripts/live_test_admission.sh
