name: PicoSentry CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install --no-cache-dir ruff
      - name: Run ruff check
        run: ruff check picosentry/ tests/ scripts/
      - name: Run ruff format check
        run: ruff format --check picosentry/ tests/ scripts/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dev deps
        run: pip install --no-cache-dir -e ".[dev]"
      - name: Run mypy
        run: mypy picosentry/ --ignore-missing-imports

  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        # `pytest tests/` (umbrella) collects every subdir — scan, watch,
        # serve — so the install needs the deps for all of them. Fastapi
        # (watch), PyJWT/passlib[bcrypt] (serve) live in the matching
        # extras; `[all]` covers runtime deps and mirrors a real
        # production install footprint. We also pull in `[dev]` for
        # pytest/ruff/mypy — `.[all]` is runtime only.
        run: pip install --no-cache-dir -e ".[all,dev]"
      - name: Run core tests
        run: python -m pytest tests/ -x --tb=short -q

  test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package with scan deps
        run: pip install --no-cache-dir -e ".[dev,scan]"
      - name: Run scan tests
        run: python -m pytest tests/scan/ -v --tb=short
      - name: Regenerate REPORT.json
        # Refresh the checked-in report so the doc-drift gate below
        # compares against the *current* corpus, not the last release.
        run: picosentry scan --validate --output tests/scan/fixtures/validation/REPORT.json
      - name: Render per-rule table from REPORT.json
        # Writes a fresh per-rule table into docs/BENCHMARKS.md between
        # the BEGIN/END sentinels. Idempotent: a no-op run produces
        # zero diff if the doc is already in sync.
        run: python scripts/render_benchmarks.py
      - name: Verify docs/BENCHMARKS.md is in sync
        # Drift gate: if a fixture was added/changed/removed without
        # re-rendering the doc, this step fails with the full diff.
        run: git diff --exit-code docs/BENCHMARKS.md

  test-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package
        # `[watch-server]` brings in fastapi + uvicorn, which the watch HTTP
        # daemon and its tests require. `[otel]` provides the metrics imports
        # used by the rate limiter and server modules under tests/watch/.
        run: pip install --no-cache-dir -e ".[dev,watch-server,otel]"
      - name: Run watch tests
        run: python -m pytest tests/watch/ -v --tb=short

  test-serve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package with serve deps
        run: pip install --no-cache-dir -e ".[dev,serve]"
      - name: Run serve tests
        run: python -m pytest tests/serve/ -v --tb=short

  postgres-live-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        postgres-version: ['15', '16']
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}-alpine
        env:
          POSTGRES_USER: picoshogun
          POSTGRES_PASSWORD: picoshogun-test
          POSTGRES_DB: picoshogun
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package with serve deps and psycopg2
        run: |
          pip install --no-cache-dir -e ".[dev,serve]"
          pip install --no-cache-dir psycopg2-binary
      - name: Run Postgres live integration test
        env:
          PICOSHOGUN_DATABASE_BACKEND: postgres
          PICOSHOGUN_DATABASE_URL: postgresql://picoshogun:picoshogun-test@127.0.0.1:15432/picoshogun
        run: |
          python - <<'PY'
          from picosentry.serve.database.manager import db
          from picosentry.serve.config.settings import settings

          assert settings.database.backend == "postgres", settings.database.backend
          print(f"connected: backend={db.backend}, dialect placeholders={db.dialect.placeholder}")

          for table in ("intelligence", "alerts", "metrics", "webhooks", "scheduled_jobs", "project_runs"):
              rows = db.execute(
                  "SELECT COUNT(*) as n FROM information_schema.tables WHERE table_name = %s",
                  (table,),
              )
              assert rows[0]["n"] == 1, f"table {table} missing"
              print(f"  table {table}: present")

          db.execute_insert(
              "INSERT INTO alerts (severity, message, org_id) VALUES (?, ?, ?)",
              ("info", "Postgres live test alert", 1),
          )
          row = db.execute_one(
              "SELECT severity, message, org_id FROM alerts WHERE message = ? ORDER BY id DESC",
              ("Postgres live test alert",),
          )
          assert row is not None
          assert row["severity"] == "info"
          assert row["org_id"] == 1
          print("  CRUD round-trip: OK")

          rows = db.execute(
              "SELECT id FROM alerts WHERE severity IN (?, ?) AND message = ?",
              ("info", "warning", "Postgres live test alert"),
          )
          assert len(rows) >= 1
          print(f"  placeholder IN clause: OK ({len(rows)} row(s))")

          db.execute("DELETE FROM alerts WHERE message = ?", ("Postgres live test alert",))
          print("Postgres live integration test: PASSED")
          PY

  test-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package
        run: pip install --no-cache-dir -e ".[dev]"
      - name: Run sandbox tests (standard)
        run: python -m pytest tests/sandbox/ -v --tb=short -m "not malicious_workload"
      - name: Run sandbox malicious workload tests
        if: ${{ github.ref == 'refs/heads/main' }}
        run: python -m pytest tests/sandbox/test_malicious_workloads.py -v --tb=short
        env:
          PICODOME_SANDBOX_TESTS: "1"

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        # `pytest tests/` (umbrella) collects every subdir — scan, watch,
        # serve — so the install needs the deps for all of them.
        # `.[all,dev]` covers runtime deps (mirrors a real production
        # install footprint) plus the test tools in `[dev]`.
        run: pip install --no-cache-dir -e ".[all,dev]"
      - name: Run full test suite
        run: python -m pytest tests/ -x --tb=short -q

  cli-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package
        run: pip install --no-cache-dir -e .
      - name: Verify CLI
        run: |
          picosentry --version
          picosentry health
          picosentry scan --help
          picosentry sandbox --help
          picosentry watch --help
          picosentry serve --help

  determinism-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package
        run: pip install --no-cache-dir -e .
      - name: Verify shared enums are consistent
        run: |
          python -c "
          from picosentry._core.models import Severity, Verdict
          from picosentry.scan.models import Severity as ScanSev
          from picosentry.sandbox.models import Severity as SandboxSev, Verdict as SandboxVerdict
          for s in Severity:
              assert ScanSev(s.value).value == s.value, f'Scan Severity mismatch: {s}'
              assert SandboxSev(s.value).value == s.value, f'Sandbox Severity mismatch: {s}'
          print('All Severity enum values match across components')
          assert Verdict.ALLOW.value == 'ALLOW'
          assert SandboxVerdict.ALLOW.value == 'ALLOW'
          print('All Verdict enum values match')
          "

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-core, cli-verification]
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t picosentry:test .
      - name: Verify Docker CLI
        run: |
          docker run --rm picosentry:test --version
          docker run --rm picosentry:test health
      - name: Verify sigstore is importable in the image
        run: |
          docker run --entrypoint python --rm picosentry:test -c "import sigstore; print('sigstore', sigstore.__version__, 'available')"
      - name: Verify --sign sigstore fails predictably (missing identity, not missing tooling)
        run: |
          output=$(docker run --rm picosentry:test corpus export /tmp/test-pack.json --sign sigstore 2>&1 || true)
          if echo "$output" | grep -qi "identity"; then
            echo "PASS: sigstore signing fails on missing identity (expected in CI without OIDC token)"
          elif echo "$output" | grep -qi "module.*not found\|ImportError.*sigstore"; then
            echo "FAIL: sigstore package is missing from the image"
            exit 1
          else
            echo "UNEXPECTED: $output"
            exit 1
          fi

  docker-build-arm64:
    runs-on: ubuntu-latest
    needs: [test-core, cli-verification]
    steps:
      - uses: actions/checkout@v7
      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build arm64 Docker image
        run: docker buildx build --platform linux/arm64 --load -t picosentry:test-arm64 .
      - name: Verify arm64 image runs scan on a known-malicious fixture
        run: |
          docker run --platform linux/arm64 --rm picosentry:test-arm64 scan tests/scan/fixtures/validation/positive/malicious_pypi/ --format json | python -c "import sys,json; d=json.load(sys.stdin); assert d['findings_count'] > 0, 'Expected findings on malicious fixture'; print(f'PASS: {d[\"findings_count\"]} findings on arm64')"
      - name: Verify arm64 image runs sandbox smoke
        run: |
          docker run --platform linux/arm64 --rm picosentry:test-arm64 sandbox --help > /dev/null && echo "PASS: sandbox --help on arm64"
