{{- if not .Values.tls.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "picodome-admission.fullname" . }}-tls
  labels:
    {{- include "picodome-admission.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.tls.certManager.enabled }}
    cert-manager.io/issuer: {{ .Values.tls.certManager.issuerRef.name }}
    {{- end }}
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
{{- end }}