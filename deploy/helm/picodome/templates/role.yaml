{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "picodome.fullname" . }}
  labels:
    {{- include "picodome.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      {{- if .Values.auth.existingSecret }}
      - {{ .Values.auth.existingSecret }}
      {{- else }}
      - {{ include "picodome.fullname" . }}-tokens
      {{- end }}
      {{- if .Values.mtls.existingTLSSecret }}
      - {{ .Values.mtls.existingTLSSecret }}
      {{- else if .Values.mtls.enabled }}
      - {{ printf "%s-tls" (include "picodome.fullname" .) }}
      {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "picodome.fullname" . }}
  labels:
    {{- include "picodome.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "picodome.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "picodome.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}