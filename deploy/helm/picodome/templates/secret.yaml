{{- if .Values.auth.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "picodome.fullname" . }}-tokens
  labels:
    {{- include "picodome.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-tokens: {{ .Values.auth.tokens | default (printf "picodome-admin-%s" (randAlphaNum 32)) | quote }}
{{- end }}