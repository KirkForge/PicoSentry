apiVersion: v1
kind: Service
metadata:
  name: {{ include "picodome.fullname" . }}
  labels:
    {{- include "picodome.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.grpc.enabled }}
    - name: grpc
      port: {{ .Values.grpc.port }}
      targetPort: grpc
      protocol: TCP
    {{- end }}
    {{- if .Values.metrics.separatePort }}
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
  selector:
    {{- include "picodome.selectorLabels" . | nindent 4 }}