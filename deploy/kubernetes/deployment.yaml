apiVersion: apps/v1
kind: Deployment
metadata:
  name: picodome
  labels:
    app: picodome
    version: v2.0.13
spec:
  replicas: 2
  selector:
    matchLabels:
      app: picodome
  template:
    metadata:
      labels:
        app: picodome
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: picodome
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: picodome
          # Replace <TAG> with the actual release version (e.g. v2.0.13).
          # The kirkforge/picodome image is not yet published to a public
          # registry; build it locally with the Dockerfile at the repo root.
          image: kirkforge/picodome:v2.0.13
          imagePullPolicy: IfNotPresent
          # Start the sandbox daemon with both transports available.
          # The daemon CLI accepts --transport=grpc to switch to gRPC;
          # the HTTP transport runs on --port (default 8443) and gRPC
          # on --grpc-port (default 50051).  See
          # deploy/helm/picodome/values.yaml `grpc.enabled` for the
          # opt-in pattern.
          args:
            - "daemon"
            - "--host=0.0.0.0"
            - "--port=8443"
            - "--transport=grpc"
            - "--grpc-port=50051"
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: PICODOME_DAEMON_HOST
              value: "0.0.0.0"
            - name: PICODOME_DAEMON_PORT
              value: "8443"
            - name: PICODOME_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: picodome-tokens
                  key: api-tokens
            - name: PICODOME_ENTERPRISE_MODE
              value: "1"
            - name: PICODOME_TLS_CERT
              value: "/tls/tls.crt"
            - name: PICODOME_TLS_KEY
              value: "/tls/tls.key"
            - name: PICODOME_TLS_CA
              value: "/tls/ca.crt"
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: data
              mountPath: /home/picodome/.picodome
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tls
          secret:
            secretName: picodome-tls
        - name: data
          persistentVolumeClaim:
            claimName: picodome-data
---
apiVersion: v1
kind: Service
metadata:
  name: picodome
  labels:
    app: picodome
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8443
      targetPort: http
      protocol: TCP
  selector:
    app: picodome
---
# gRPC transport Service.  The pod's container is launched with
# `--transport=grpc --grpc-port=50051` (see the Deployment above) so
# the gRPC server is reachable on 50051 alongside the HTTP API on 8443.
# Delete this Service if you only need the HTTP transport.
apiVersion: v1
kind: Service
metadata:
  name: picodome-grpc
  labels:
    app: picodome
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  selector:
    app: picodome
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: picodome-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# IMPORTANT: Create this secret with a strong token before deploying.
# Do NOT store real tokens in this manifest.
#
# Example:
#   kubectl create secret generic picodome-tokens \
#     --from-literal=api-tokens='picodome-admin-$(openssl rand -hex 32)'
#
apiVersion: v1
kind: Secret
metadata:
  name: picodome-tokens
type: Opaque
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: picodome
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: picodome
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["picodome-tokens", "picodome-tls"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: picodome
subjects:
  - kind: ServiceAccount
    name: picodome
roleRef:
  kind: Role
  name: picodome
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: picodome-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: picodome
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8443
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 53
    - to: []
      ports:
        - protocol: TCP
          port: 443