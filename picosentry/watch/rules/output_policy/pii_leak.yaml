# PicoWatch Default Output Policy Rules — PII Leak category

- id: out_pii_ssn
  category: pii_leak
  weight: 0.95
  pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
  description: "SSN pattern detection"
  normalization: [unicode, whitespace]

- id: out_pii_credit_card
  category: pii_leak
  weight: 0.95
  pattern: "\\b(?:\\d{4}[\\s-]?){3}\\d{4}\\b"
  description: "Credit card number pattern"
  normalization: [unicode, whitespace]

- id: out_pii_email
  category: pii_leak
  weight: 0.8
  pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b"
  description: "Email address pattern"
  normalization: [unicode, whitespace]

- id: out_pii_phone
  category: pii_leak
  weight: 0.75
  pattern: "\\b(?:\\+?1[-.]\\s?)?\\(?\\d{3}\\)?[-.]?\\d{3}[-.]?\\d{4}\\b|\\b\\+?(?:\\d{1,3}[-.]\\s?)?\\(?\\d{1,4}\\)?[-.]?\\d{3,4}[-.]?\\d{3,4}\\b"
  description: "Phone number pattern (US + international)"
  normalization: [unicode, whitespace]

- id: out_pii_api_key
  category: pii_leak
  weight: 0.9
  pattern: "(?:AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[0-9A-Z]{16}|(?:sk|pk|rk)_[a-zA-Z0-9]{20,}|AIza[0-9A-Za-z_-]{35}|ghp_[a-zA-Z0-9]{36}"
  description: "API key patterns (AWS, OpenAI, GCP, GitHub)"
  normalization: [unicode, whitespace]

- id: out_pii_ip_address
  category: pii_leak
  weight: 0.70
  pattern: "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b"
  description: "IP address leak (public or private)"
  normalization: [unicode, whitespace]

- id: out_pii_passport
  category: pii_leak
  weight: 0.85
  pattern: "\\b[A-Z]{2}\\d{7,9}\\b|\\b[A-Z]\\d{8,9}\\b"
  description: "Passport or national ID number pattern (tightened)"
  normalization: [unicode, whitespace]

- id: out_pii_jwt
  category: pii_leak
  weight: 0.88
  pattern: "eyJ[A-Za-z0-9_-]+\\.eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
  description: "JWT token leak"
  normalization: [unicode, whitespace]

- id: out_pii_crypto_wallet
  category: pii_leak
  weight: 0.80
  pattern: "0x[0-9a-fA-F]{40}|[13][a-km-zA-HJ-NP-Z1-9]{25,34}|bc1[qQ][0-9a-zA-Z]{39,59}"
  description: "Cryptocurrency wallet address (ETH/BTC, tightened)"
  normalization: [unicode, whitespace]

- id: out_pii_aws_arn
  category: pii_leak
  weight: 0.85
  pattern: "arn:aws[a-z-]*:[a-z0-9-]+:[a-z0-9-]*:\\d*:[^\\s]+"
  description: "AWS ARN (Amazon Resource Name) leak"
  normalization: [unicode, whitespace]
